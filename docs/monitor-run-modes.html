<html lang="en">
<head>

  <script src="https://d3js.org/d3.v7.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ── */

      --bg:              #0b0e14;
      --dot:             #181e2d;
      --text:            #e2e8f0;
      --title:           #f1f5f9;
      --muted:           #3d5060;
      --muted-2:         #7a8fa0;
      --panel-bg:        rgba(11, 14, 20, 0.88);
      --panel-bg-solid:  rgba(11, 14, 20, 0.96);
      --panel-border:    #1a2030;
      --tt-title:        #cbd5e1;
      --hint:            #252d3a;
    }

    body[data-theme="light"] {
      --bg:              #f5f7fb;
      --dot:             #d4dbe7;
      --text:            #1e293b;
      --title:           #0f172a;
      --muted:           #94a3b8;
      --muted-2:         #64748b;
      --panel-bg:        rgba(255, 255, 255, 0.85);
      --panel-bg-solid:  rgba(255, 255, 255, 0.96);
      --panel-border:    #d8dee9;
      --tt-title:        #334155;
      --hint:            #c3ccda;
    }

    body {
      background: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;

    #header {

      pointer-events: none;

<script>
// ── Palette ───────────────────────────────────────────────────────────────────

let T = THEMES.light;

// ── Layout columns (x): sampled lane · centre fork · packet lane ───────────────

const CX = 480;   // centre (shared fork + shared pipeline)
const RX = 720;   // right  (packet path)

// ── Nodes ─────────────────────────────────────────────────────────────────────

  { id:0, label:'python -m ids.apps.monitor', group:'cli', icon:'⌨', x:CX, y:70,

  { id:1, label:'simulate', group:'cmd', icon:'🎛', x:LX, y:185,

  { id:8, label:'PcapReplay', group:'source', icon:'📂', x:600, y:685,
    desc:'PacketSource, mode=\'replay\'. Reads a pcap/pcapng via _iter_packets — cross-platform (macOS dev, no root). --realtime paces to the capture\'s own inter-arrival timing; --loop restarts forever. Yields (ts, raw_bytes).' },

  { id:10, label:'PacketWindowProducer', group:'producer', icon:'📦', x:RX, y:810,
    desc:'Wraps the chosen PacketSource + a StreamWindower. mode = source.mode (\'replay\'|\'live\'). Runs the packet-rate loop: parse → tumbling 10-packet window per host-pair → emit WindowResult; flush_idle on timeout / EOF.' },

  // ── shared pipeline (below the divider) ───────────────────────────────────
  { id:11, label:'WindowResult queue', group:'detect', icon:'📥', x:CX, y:935,
    desc:'Bounded queue.Queue (IDS_QUEUE_MAXSIZE=2000), drop-oldest on overflow. The boundary between the capture thread (all packet-rate work) and the asyncio consumer. No locks — windower state stays in the thread.' },
  { id:12, label:'Detector: gate(2)→family(8)', group:'detect', icon:'🧠', x:CX, y:1050,
    desc:'detector._handle per window: the 2-class gate (Benign/Attack) drives the alert; only if malicious does the 8-class family run. Attributes attacker IP vs PROTECTED_IPS, updates stats, publishes flow/alert; a lifecycle loop emits \'recovered\' after RECOVER_AFTER_S idle.' },
  { id:13, label:'Broker · SSE /api/stream', group:'sink', icon:'📨', x:CX, y:1165,
    desc:'events.Broker fan-out. Detector publishes {type: flow|alert|recovered}; GET /api/stream serves them as Server-Sent Events. Per-alert gate SHAP (FlowExplainer) rides the alert, falling back to a saliency proxy.' },
  { id:14, label:'Dashboard / mock site', group:'sink', icon:'🖥', x:CX, y:1280,
    desc:'ids-frontend (sibling repo) Live Monitor + mock_site. Subscribe via EventSource to /api/stream; also poll GET /api/stats and GET /api/health (which reports the active mode + model).' },
];

// ── Edges ─────────────────────────────────────────────────────────────────────
const links = [
  // entry → subcommands
  { s:0, t:1, label:'simulate' },
  { s:0, t:2, label:'replay' },
  { s:0, t:3, label:'live' },

  // subcommands set env → config
  { s:1, t:4, label:'IDS_SOURCE=simulate' },
  { s:2, t:4, label:'IDS_SOURCE=replay' },
  { s:3, t:4, label:'IDS_SOURCE=live' },

  // config → producer factory
  { s:4, t:5, label:'read' },

  // producer factory branches
  { s:5, t:6, label:"== 'simulate'" },
  { s:5, t:7, label:'else (packet)' },

  // capture factory branches
  { s:7, t:9, label:"== 'live'" },
  { s:7, t:8, label:'else (replay)' },

  // sources → packet producer
  { s:8, t:10, label:'source' },
  { s:9, t:10, label:'source' },

  // both producers emit WindowResults → queue
  { s:6,  t:11, label:'emit WindowResult', wp:[[LX, 579],[LX, 935],[CX - 105, 935]], lp:[LX + 8, 760, 'start'] },
  { s:10, t:11, label:'emit WindowResult' },

  // shared pipeline
  { s:11, t:12, label:'dequeue' },
  { s:12, t:13, label:'publish' },
  { s:13, t:14, label:'EventSource' },
];

// ── Geometry ──────────────────────────────────────────────────────────────────
const NODE_H = 38;
function nodeW(label) { return Math.max(128, label.length * 7.8 + 52); }
nodes.forEach(n => { n.w = nodeW(n.label); n.h = NODE_H; });

const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));
const edges = links.map(l => ({ ...l, source: nodeById[l.s], target: nodeById[l.t] }));

// ── SVG scaffold ──────────────────────────────────────────────────────────────
const W = window.innerWidth;
const H = window.innerHeight;

const svg = d3.select('#graph');
const root = svg.append('g');

const zoom = d3.zoom().scaleExtent([0.18, 4])
  .filter(event => event.type === 'wheel' || !event.target.closest('.node'))
  .on('zoom', e => root.attr('transform', e.transform));
svg.call(zoom);

svg.on('click', e => { if (!e.target.closest('.node')) resetHL(); });

// ── Auto-fit on load ──────────────────────────────────────────────────────────
const PAD = 80;
const allX = nodes.map(n => n.x);
const allY = nodes.map(n => n.y);
const gMinX = Math.min(...allX) - 170;
const gMaxX = Math.max(...allX) + 170;
const gMinY = Math.min(...allY) - 70;
const gMaxY = Math.max(...allY) + 90;
const gW = gMaxX - gMinX;
const gH = gMaxY - gMinY;
const initScale = Math.min((W - PAD * 2) / gW, (H - PAD * 2) / gH);
const initTx = (W - gW * initScale) / 2 - gMinX * initScale;
const initTy = (H - gH * initScale) / 2 - gMinY * initScale;
svg.call(zoom.transform, d3.zoomIdentity.translate(initTx, initTy).scale(initScale));

// ── Defs: markers + glow ──────────────────────────────────────────────────────
const defs = svg.append('defs');

Object.entries(C).forEach(([g, col]) => {
  defs.append('marker')
    .attr('id', `arr-${g}`)
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 7).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-4L8,0L0,4').attr('fill', col).attr('opacity', 0.65);
});

const filt = defs.append('filter').attr('id', 'glow');
filt.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
const fm = filt.append('feMerge');
fm.append('feMergeNode').attr('in', 'blur');
fm.append('feMergeNode').attr('in', 'SourceGraphic');

// ── Orthogonal path helper ─────────────────────────────────────────────────────
function roundedOrtho(pts, r) {
  if (pts.length < 2) return '';
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length - 1; i++) {
    const [x0, y0] = pts[i - 1], [x1, y1] = pts[i], [x2, y2] = pts[i + 1];
    const l1 = Math.hypot(x1 - x0, y1 - y0), l2 = Math.hypot(x2 - x1, y2 - y1);
    const rr = Math.min(r, l1 / 2, l2 / 2);
    const ax = x1 - Math.sign(x1 - x0) * rr, ay = y1 - Math.sign(y1 - y0) * rr;
    const bx = x1 + Math.sign(x2 - x1) * rr, by = y1 + Math.sign(y2 - y1) * rr;
    d += ` L ${ax} ${ay} Q ${x1} ${y1} ${bx} ${by}`;
  }
  const e = pts[pts.length - 1];
  d += ` L ${e[0]} ${e[1]}`;
  return d;
}

function autoOrtho(s, t) {
  const dx = t.x - s.x, dy = t.y - s.y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    const sx = s.x + Math.sign(dx || 1) * s.w / 2;
    const tx = t.x - Math.sign(dx || 1) * t.w / 2;
    const mx = (sx + tx) / 2;
    return [[sx, s.y], [mx, s.y], [mx, t.y], [tx, t.y]];
  }
  const sy = s.y + Math.sign(dy || 1) * s.h / 2;
  const ty = t.y - Math.sign(dy || 1) * t.h / 2;
  const my = (sy + ty) / 2;
  return [[s.x, sy], [s.x, my], [t.x, my], [t.x, ty]];
}

// ── Edge path helper ──────────────────────────────────────────────────────────
function edgePath(d) {
  const s = d.source, t = d.target;
  if (d.wp) return roundedOrtho(d.dirty ? autoOrtho(s, t) : d.wp, 10);
  const sx = s.x, sy = s.y, tx = t.x, ty = t.y;
  const dx = tx - sx, dy = ty - sy;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;

  const ang = Math.atan2(Math.abs(dy), Math.abs(dx));
  const cornerAng = Math.atan2(t.h / 2, t.w / 2);
  const edgeOff = ang < cornerAng ? t.w / 2 : t.h / 2;
  const offset = edgeOff / Math.cos(ang < cornerAng ? ang : Math.PI / 2 - ang);
  const safeDist = Math.max(0, Math.min(offset + 6, dist - 4));
  const ex = tx - (dx / dist) * safeDist;
  const ey = ty - (dy / dist) * safeDist;

  const isVertical = Math.abs(dx) < 8;
  if (isVertical) return `M${sx},${sy} L${ex},${ey}`;

  const k = d.k !== undefined ? d.k : 0.14;
  const cpx = (sx + tx) / 2 - (ty - sy) * k;
  const cpy = (sy + ty) / 2 + (tx - sx) * k;
  return `M${sx},${sy} Q${cpx},${cpy} ${ex},${ey}`;
}

function edgeLabelPos(d) {
  const s = d.source, t = d.target;
  if (d.wp) {
    if (!d.dirty && d.lp) return { x: d.lp[0], y: d.lp[1], anchor: d.lp[2] || 'middle' };
    const pts = d.dirty ? autoOrtho(s, t) : d.wp;
    let best = -1, bi = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      const L = Math.abs(pts[i + 1][0] - pts[i][0]) + Math.abs(pts[i + 1][1] - pts[i][1]);
      if (L > best) { best = L; bi = i; }
    }
    const a = pts[bi], b = pts[bi + 1];
    const horiz = Math.abs(b[0] - a[0]) > Math.abs(b[1] - a[1]);
    return { x: (a[0] + b[0]) / 2, y: (a[1] + b[1]) / 2 - (horiz ? 4 : 0), anchor: 'middle' };
  }
  const sx = s.x, sy = s.y, tx = t.x, ty = t.y;
  if (Math.abs(tx - sx) < 8) return { x: sx + 7, y: (sy + ty) / 2, anchor: 'start' };
  const k = d.k !== undefined ? d.k : 0.14;
  const cpx = (sx + tx) / 2 - (ty - sy) * k;
  const cpy = (sy + ty) / 2 + (tx - sx) * k;
  return {
    x: 0.25 * sx + 0.5 * cpx + 0.25 * tx,
    y: 0.25 * sy + 0.5 * cpy + 0.25 * ty - 5,
    anchor: 'middle',
  };
}

// ── Lane tints, divider & labels ──────────────────────────────────────────────
const laneLayer = root.append('g');

// Selection region (everything above the divider)
laneLayer.append('rect')
  .attr('x', 55).attr('y', 40).attr('width', 870).attr('height', DIV_Y - 40 - 8)
  .attr('rx', 8)
  .attr('fill', '#a855f7').attr('fill-opacity', 0.018)
  .attr('stroke', '#a855f7').attr('stroke-opacity', 0.06).attr('stroke-width', 1);

// Shared pipeline region (below the divider)
laneLayer.append('rect')
  .attr('x', CX - 180).attr('y', DIV_Y + 10).attr('width', 360).attr('height', 412)
  .attr('rx', 8)
  .attr('fill', '#22c55e').attr('fill-opacity', 0.018)
  .attr('stroke', '#22c55e').attr('stroke-opacity', 0.10).attr('stroke-width', 1)
  .attr('stroke-dasharray', '6,5');

// Horizontal separator
const laneDivider = laneLayer.append('line')
  .attr('x1', 55).attr('y1', DIV_Y)
  .attr('x2', 925).attr('y2', DIV_Y)
  .attr('stroke', T.laneDivider)
  .attr('stroke-width', 1)
  .attr('stroke-dasharray', '4,6');

// Region labels
const laneLabels = laneLayer.selectAll('.lane-title')
  .data([
    { x: CX, y: 28,          text: 'MODE SELECTION — capture source + window producer' },
    { x: CX, y: DIV_Y + 30,  text: 'SHARED PIPELINE — identical for every mode' },
  ])
  .join('text')
  .attr('class', 'lane-title')
  .attr('x', d => d.x).attr('y', d => d.y)
  .attr('font-family', 'Syne, sans-serif')
  .attr('font-size', '11px')
  .attr('font-weight', '700')
  .attr('fill', T.laneLabel)
  .attr('text-anchor', 'middle')
  .attr('letter-spacing', '0.1em')
  .text(d => d.text);

// ── Edge layer ────────────────────────────────────────────────────────────────
const edgeLayer = root.append('g');
const edgeGs = edgeLayer.selectAll('g').data(edges).join('g').attr('class', 'edge-g');

const edgePaths = edgeGs.append('path')
  .attr('fill', 'none')
  .attr('stroke', d => C[d.source.group])
  .attr('stroke-width', 1.4)
  .attr('stroke-opacity', 0.32)
  .attr('marker-end', d => `url(#arr-${d.source.group})`)
  .attr('d', edgePath);

const edgeLabels = edgeGs.append('text')
  .attr('font-family', 'IBM Plex Mono, monospace')
  .attr('font-size', '9px')
  .attr('fill', T.edgeLabel)
  .text(d => d.label)
  .attr('transform', d => {
    const p = edgeLabelPos(d);
    return `translate(${p.x},${p.y})`;
  })
  .attr('text-anchor', d => edgeLabelPos(d).anchor);

// ── Pulse rings on CLI entry (id 0) ───────────────────────────────────────────
const pulseLayer = root.append('g');

[0, 0.9, 1.8].forEach(delay => {
  pulseLayer.append('circle')
    .attr('class', 'pulse-ring')
    .attr('data-pulse', 0)
    .attr('cx', nodeById[0].x).attr('cy', nodeById[0].y)
    .attr('r', 24)
    .style('stroke', '#f59e0b')
    .style('animation-delay', `${delay}s`);
});

// ── Node layer ────────────────────────────────────────────────────────────────
const nodeLayer = root.append('g');
const nodeGs = nodeLayer.selectAll('g').data(nodes).join('g')
  .attr('class', 'node')
  .style('cursor', 'grab')
  .attr('transform', d => `translate(${d.x},${d.y})`)
  .on('click', (e, d) => { e.stopPropagation(); if (didDrag) { didDrag = false; return; } toggleHL(d); })
  .on('mouseenter', (e, d) => {
    const tt = document.getElementById('tooltip');
    document.getElementById('tt-title').textContent = d.label;
    document.getElementById('tt-desc').textContent = d.desc;
    tt.style.display = 'block';
    posTooltip(e);
  })
  .on('mousemove', posTooltip)
  .on('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });

// Rect
nodeGs.append('rect')
  .attr('x', d => -d.w / 2).attr('y', d => -d.h / 2)
  .attr('width', d => d.w).attr('height', d => d.h)
  .attr('rx', 5)
  .attr('fill', d => C[d.group] + '14')
  .attr('stroke', d => C[d.group])
  .attr('stroke-width', 1.3)
  .attr('stroke-opacity', 0.55);

// Icon
nodeGs.append('text')
  .attr('x', d => -d.w / 2 + 12).attr('y', 5)
  .attr('font-size', '13px')
  .text(d => d.icon);

// Label
nodeGs.append('text')
  .attr('x', d => -d.w / 2 + 28).attr('y', 5)
  .attr('font-family', 'IBM Plex Mono, monospace')
  .attr('font-size', '10.5px')
  .attr('font-weight', '500')
  .attr('fill', d => C[d.group])
  .text(d => d.label);

// ── Drag to reposition blocks ─────────────────────────────────────────────────
function refreshEdges() {
  edgePaths.attr('d', edgePath);
  edgeLabels
    .attr('transform', d => { const p = edgeLabelPos(d); return `translate(${p.x},${p.y})`; })
    .attr('text-anchor', d => edgeLabelPos(d).anchor);
}

let didDrag = false;
const drag = d3.drag()
  .on('start', function () {
    didDrag = false;
    d3.select(this).style('cursor', 'grabbing');
    document.getElementById('tooltip').style.display = 'none';
  })
  .on('drag', function (event, d) {
    didDrag = true;
    d.x = event.x;
    d.y = event.y;
    d3.select(this).attr('transform', `translate(${d.x},${d.y})`);
    edges.forEach(l => { if (l.source.id === d.id || l.target.id === d.id) l.dirty = true; });
    refreshEdges();
    pulseLayer.selectAll(`[data-pulse="${d.id}"]`).attr('cx', d.x).attr('cy', d.y);
  })
  .on('end', function () {
    d3.select(this).style('cursor', 'grab');
  });

nodeGs.call(drag);

// ── Tooltip ───────────────────────────────────────────────────────────────────
function posTooltip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 310) + 'px';
  tt.style.top  = Math.min(e.clientY - 8,  window.innerHeight - 150) + 'px';
}

// ── Highlight ─────────────────────────────────────────────────────────────────
let activeId = null;

function toggleHL(d) {
  if (activeId === d.id) { resetHL(); return; }
  activeId = d.id;

  const connected = new Set([d.id]);
  edges.forEach(l => {
    if (l.source.id === d.id) connected.add(l.target.id);
    if (l.target.id === d.id) connected.add(l.source.id);
  });

  nodeGs.select('rect')
    .attr('stroke-opacity', n => connected.has(n.id) ? 0.9 : 0.08)
    .attr('fill', n => connected.has(n.id) ? C[n.group] + '28' : C[n.group] + '05');
  nodeGs.selectAll('text')
    .attr('opacity', n => connected.has(n.id) ? 1 : 0.1);

  edgePaths
    .attr('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 0.85 : 0.03)
    .attr('stroke-width',   l => (l.source.id === d.id || l.target.id === d.id) ? 2.2 : 1.4);
  edgeLabels
    .attr('fill', l => (l.source.id === d.id || l.target.id === d.id)
      ? C[l.source.group]
      : T.edgeLabelDim)
    .attr('font-size', l => (l.source.id === d.id || l.target.id === d.id) ? '9.5px' : '9px');

  pulseLayer.attr('opacity', connected.has(0) ? 1 : 0.06);
}

function resetHL() {
  activeId = null;
  nodeGs.select('rect')
    .attr('stroke-opacity', 0.55)
    .attr('fill', d => C[d.group] + '14');
  nodeGs.selectAll('text').attr('opacity', 1);
  edgePaths
    .attr('stroke-opacity', 0.32)
    .attr('stroke-width', 1.4);
  edgeLabels
    .attr('fill', T.edgeLabel)
    .attr('font-size', '9px');
  pulseLayer.attr('opacity', 1);
}

// ── Theme toggle ──────────────────────────────────────────────────────────────
function applyTheme(name) {
  T = THEMES[name] || THEMES.dark;
  document.body.dataset.theme = name;
  document.getElementById('theme-icon').textContent  = name === 'light' ? '☾' : '☀';
  document.getElementById('theme-label').textContent = name === 'light' ? 'Dark' : 'Light';
  laneDivider.attr('stroke', T.laneDivider);
  laneLabels.attr('fill', T.laneLabel);
  const was = activeId;
  resetHL();
  if (was !== null) toggleHL(nodeById[was]);
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  applyTheme(document.body.dataset.theme === 'light' ? 'dark' : 'light');
});
</script>
</body>
</html>
