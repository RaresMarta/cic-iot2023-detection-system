<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo Web Server</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body data-threat="calm">
  <!-- Minimal guard indicator. Rich attack visuals live in the IDS dashboard, not here:
       this page is just a generic server being protected. -->
  <div id="guardian" class="guardian guardian--calm">
    <span class="guardian__dot"></span>
    <div class="guardian__text">
      <strong id="guardian-state">Protected</strong>
      <small id="guardian-detail">traffic nominal</small>
    </div>
  </div>

  <div class="ambient" aria-hidden="true"></div>

  <main class="server">
    <div class="server__badge">DEMO</div>
    <h1>Web&nbsp;Server</h1>
    <p>A placeholder server standing in for a protected client. All traffic to this
       host is observed by the IDS sensor, which detects and alerts on malicious traffic.</p>
    <div class="row">
      <button class="ghost" id="ping">Send a request</button>
      <span id="ping-result" class="muted"></span>
    </div>
    <p class="meta muted">host 172.30.0.10 · port 80 · status <span class="ok-text">online</span></p>
  </main>

  <script>window.DETECTOR_URL = "{{DETECTOR_URL}}";</script>
  <script src="/static/app.js"></script>
</body>
</html>
